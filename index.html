<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>RPG Framework</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div id="game">

    <div id="hud">
      <div id="stats"></div>
      <div id="health"></div>
      <div id="xp"></div>
    </div>

    <div id="dialogue"></div>
    <div id="choices"></div>

    <button onclick="save()">Save</button>
    <button onclick="load()">Load</button>

    <div id="combat" class="hidden">
      <div id="enemy"></div>
      <button id="attackBtn">Attack</button>
    </div>

  </div>

  <script type="module" src="main.js"></script>
</body>

</html>
