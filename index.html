<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Ashenfall</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="game">

  <div id="scene">
    <div id="dialogue"></div>
    <div id="choices"></div>
  </div>

  <div id="combat" class="hidden">
    <div id="enemy"></div>
    <div id="combatLog"></div>
    <button id="attackBtn">Attack</button>
    <button id="runBtn">Run</button>
  </div>

  <div id="hud">
    <div id="health"></div>
    <div id="stats"></div>
    <div id="inventory"></div>
    <div id="quests"></div>
  </div>

</div>

<script type="module" src="engine/main.js"></script>
</body>
</html>
